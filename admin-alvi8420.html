<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<!-- ================= LOGIN ================= -->
<div class="admin-login" id="loginBox">
  <div class="box">
    <div style="text-align:center;margin-bottom:24px;">
      <svg class="khatam" viewBox="0 0 100 100" style="width:40px;height:40px;margin:0 auto 10px;"><path d="M50 5 L61 39 L97 39 L68 60 L79 95 L50 74 L21 95 L32 60 L3 39 L39 39 Z" fill="none" stroke="#D9A94E" stroke-width="3"/></svg>
      <h3 style="margin:0;">Admin Login</h3>
      <p style="color:var(--muted);font-size:.85rem;">Alvi Tours &amp; Travels — Panel</p>
    </div>
    <div class="form-msg err" id="loginErr" style="display:none;"></div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-gold btn-block">Login</button>
    </form>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashBox" style="display:none;">
  <div class="admin-topbar">
    <div class="container">
      <div style="display:flex;align-items:center;gap:10px;">
        <svg class="khatam" viewBox="0 0 100 100" style="width:24px;height:24px;"><path d="M50 5 L61 39 L97 39 L68 60 L79 95 L50 74 L21 95 L32 60 L3 39 L39 39 Z" fill="#D9A94E"/></svg>
        <b>Admin Panel</b><span style="color:var(--gold-light);font-size:.82rem;" id="adminEmailLabel"></span>
      </div>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="admin-tabs">
      <button class="admin-tab active" data-panel="panelPending">Pending Requests</button>
      <button class="admin-tab" data-panel="panelHistory">History</button>
      <button class="admin-tab" data-panel="panelPackages">Manage Packages</button>
      <button class="admin-tab" data-panel="panelNotices">Notice Board</button>
    </div>

    <!-- PENDING -->
    <div class="admin-panel active" id="panelPending">
      <div id="pendingList"></div>
    </div>

    <!-- HISTORY -->
    <div class="admin-panel" id="panelHistory">
      <div id="historyList"></div>
    </div>

    <!-- PACKAGES -->
    <div class="admin-panel" id="panelPackages">
      <div class="card-row">
        <h4 style="margin-top:0;">Naya Package Add Karein</h4>
        <form id="pkgForm">
          <div class="admin-form-grid">
            <div class="field"><label>Title</label><input name="title" required placeholder="Umrah Economy Package"></div>
            <div class="field"><label>Category</label>
              <select name="category" required>
                <option value="umrah">Umrah</option>
                <option value="hajj">Hajj</option>
                <option value="iraq">Ziyarat — Iraq</option>
                <option value="iran">Ziyarat — Iran</option>
              </select>
            </div>
            <div class="field"><label>Price</label><input name="price" required placeholder="PKR 1,80,000"></div>
            <div class="field"><label>Duration</label><input name="duration" placeholder="10 Din / Days"></div>
            <div class="field" style="grid-column:1/-1;"><label>Description</label><textarea name="description" rows="2"></textarea></div>
            <div class="field" style="grid-column:1/-1;"><label>Image URL</label><input name="imageUrl" placeholder="https://..."></div>
          </div>
          <button type="submit" class="btn btn-gold" style="margin-top:6px;">Add Package</button>
        </form>
      </div>
      <div id="pkgAdminList"></div>
    </div>

    <!-- NOTICES -->
    <div class="admin-panel" id="panelNotices">
      <div class="card-row">
        <h4 style="margin-top:0;">Naya Notice Post Karein</h4>
        <form id="noticeForm">
          <div class="field"><label>Title</label><input name="title" required></div>
          <div class="field"><label>Message</label><textarea name="message" rows="3" required></textarea></div>
          <div class="field"><label>Image URL (optional)</label><input name="imageUrl" placeholder="https://..."></div>
          <button type="submit" class="btn btn-gold">Post Notice</button>
        </form>
      </div>
      <div id="noticeAdminList"></div>
    </div>
  </div>
  <div style="height:60px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
</body>
</html>
